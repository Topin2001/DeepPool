events {
    worker_connections 1024;
}

http {
    # Sécurité globale
    server_tokens off;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Upstream
    upstream web     { server web:80; }
    upstream api     { server api:8000; }
    upstream grafana  { server grafana:3000; }

    # ─── HTTP → HTTPS redirect + challenge ACME ───────────────────────────────
    server {
        listen 80;
        server_name deeppool.galpin.fr;

        # ── Application web (React) ──────────────────────────────────────────
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # ── API FastAPI ──────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout un peu plus long pour les requêtes InfluxDB
            proxy_read_timeout 30s;
        }

        # ── Grafana ──────────────────────────────────────────────────────────
        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Nécessaire pour Grafana websockets (live panels)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

}
