<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">DeepPool — Architecture des services</text>
  <text x="450" y="60" text-anchor="middle" fill="#64748b" font-size="12">docker compose — réseau interne "internal"</text>

  <!-- Internet / User -->
  <g>
    <rect x="370" y="84" width="160" height="46" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="450" y="112" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Utilisateur (web)</text>
  </g>
  <line x1="450" y1="130" x2="450" y2="172" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="466" y="155" fill="#94a3b8" font-size="11">HTTPS :443</text>

  <!-- Nginx reverse proxy -->
  <g>
    <rect x="330" y="174" width="240" height="56" rx="10" fill="#1d4ed8" opacity="0.18" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="450" y="198" text-anchor="middle" fill="#bfdbfe" font-size="14" font-weight="700">nginx</text>
    <text x="450" y="216" text-anchor="middle" fill="#93c5fd" font-size="11">reverse proxy + TLS</text>
  </g>

  <!-- Web, API, Grafana row -->
  <line x1="410" y1="230" x2="150" y2="276" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="450" y1="230" x2="450" y2="276" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="490" y1="230" x2="750" y2="276" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>

  <g>
    <rect x="60" y="278" width="180" height="58" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="150" y="302" text-anchor="middle" fill="#bae6fd" font-size="14" font-weight="700">web (React)</text>
    <text x="150" y="320" text-anchor="middle" fill="#7dd3fc" font-size="11">Dashboard + Nginx statique</text>
  </g>

  <g>
    <rect x="360" y="278" width="180" height="58" rx="10" fill="#22c55e" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
    <text x="450" y="302" text-anchor="middle" fill="#bbf7d0" font-size="14" font-weight="700">api (FastAPI)</text>
    <text x="450" y="320" text-anchor="middle" fill="#86efac" font-size="11">JWT + endpoints REST</text>
  </g>

  <g>
    <rect x="660" y="278" width="180" height="58" rx="10" fill="#f97316" opacity="0.15" stroke="#fb923c" stroke-width="1.5"/>
    <text x="750" y="302" text-anchor="middle" fill="#fed7aa" font-size="14" font-weight="700">grafana</text>
    <text x="750" y="320" text-anchor="middle" fill="#fdba74" font-size="11">Visualisation avancée</text>
  </g>

  <!-- API -> web (proxy /api) -->
  <line x1="240" y1="307" x2="360" y2="307" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

  <!-- API & Grafana -> InfluxDB -->
  <line x1="450" y1="336" x2="450" y2="396" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="750" y1="336" x2="540" y2="396" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- API & logic -> config files -->
  <line x1="360" y1="307" x2="170" y2="430" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- InfluxDB -->
  <g>
    <rect x="360" y="398" width="180" height="58" rx="10" fill="#a855f7" opacity="0.15" stroke="#c084fc" stroke-width="1.5"/>
    <text x="450" y="422" text-anchor="middle" fill="#e9d5ff" font-size="14" font-weight="700">influxdb</text>
    <text x="450" y="440" text-anchor="middle" fill="#d8b4fe" font-size="11">Séries temporelles</text>
  </g>

  <!-- logic -->
  <g>
    <rect x="60" y="398" width="200" height="58" rx="10" fill="#eab308" opacity="0.15" stroke="#facc15" stroke-width="1.5"/>
    <text x="160" y="422" text-anchor="middle" fill="#fef9c3" font-size="14" font-weight="700">logic (Python)</text>
    <text x="160" y="440" text-anchor="middle" fill="#fef08a" font-size="11">Capteur, pompe, planning</text>
  </g>

  <!-- logic -> influxdb -->
  <line x1="260" y1="427" x2="360" y2="427" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- config files -->
  <g>
    <rect x="60" y="488" width="200" height="56" rx="10" fill="#334155" stroke="#475569" stroke-width="1.5"/>
    <text x="160" y="510" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Fichiers JSON</text>
    <text x="160" y="528" text-anchor="middle" fill="#94a3b8" font-size="11">config / schedule / override</text>
  </g>
  <line x1="160" y1="456" x2="160" y2="486" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Raspberry Pi GPIO -->
  <g>
    <rect x="660" y="398" width="180" height="58" rx="10" fill="#ef4444" opacity="0.15" stroke="#f87171" stroke-width="1.5"/>
    <text x="750" y="422" text-anchor="middle" fill="#fecaca" font-size="14" font-weight="700">GPIO Raspberry Pi</text>
    <text x="750" y="440" text-anchor="middle" fill="#fca5a5" font-size="11">Capteur, relais, switches</text>
  </g>
  <line x1="260" y1="427" x2="660" y2="427" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#arrow)" transform="translate(0,0)"/>
  <text x="460" y="470" text-anchor="middle" fill="#64748b" font-size="11">logic ↔ GPIO (privileged container)</text>

  <!-- watchtower note -->
  <text x="450" y="545" text-anchor="middle" fill="#475569" font-size="11">watchtower surveille et met à jour automatiquement toutes les images ghcr.io</text>
</svg>
