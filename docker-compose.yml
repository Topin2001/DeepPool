services:
  # --- LE CERVEAU ---
  logic:
    image: ghcr.io/topin2001/deeppool/deeppool-logic:latest
    container_name: deeppool-logic
    privileged: true
    devices:
      - /dev/gpiomem:/dev/gpiomem
    volumes:
      - /sys:/sys:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./config.json:/config/config.json
      - ./schedule.json:/config/schedule.json
      - ./override.json:/config/override.json
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Paris
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    restart: unless-stopped
    depends_on:
      - influxdb

  # --- LA BASE DE DONNÉES ---
  influxdb:
    image: influxdb:latest
    container_name: deeppool-influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    restart: always

  # --- L'INTERFACE GRAPHIQUE ---
  grafana:
    image: grafana/grafana-oss:latest
    container_name: deeppool-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana_data:/var/lib/grafana
    environment:
      - TZ=Europe/Paris
      - GF_SERVER_ENABLE_GZIP=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    restart: always

  # --- API ---
  api:
    image: ghcr.io/topin2001/deeppool/deeppool-api:latest
    container_name: deeppool-api
    ports:
      - "8000:8000"
    volumes:
      - ./config.json:/config/config.json
      - ./schedule.json:/config/schedule.json
      - ./override.json:/config/override.json
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
      - API_SECRET_KEY=${API_SECRET_KEY}
    restart: unless-stopped
    depends_on:
      - influxdb

  # --- MISES À JOUR ---
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: deeppool-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup
    restart: always