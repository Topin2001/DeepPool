services:

  # --- LE CERVEAU ---
  logic:
    image: ghcr.io/topin2001/deeppool/deeppool-logic:latest
    container_name: deeppool-logic
    privileged: true
    devices:
      - /dev/gpiomem:/dev/gpiomem
    volumes:
      - /sys:/sys:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./config.json:/config/config.json
      - ./schedule.json:/config/schedule.json
      - ./override.json:/config/override.json
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Paris
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - influxdb

  # --- BASE DE DONNÉES ---
  influxdb:
    image: influxdb:latest
    container_name: deeppool-influxdb
    volumes:
      - ./influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - INFLUXDB_HTTP_CORS_ALLOWED_ORIGINS=https://${DOMAIN}
    restart: always
    networks:
      - internal

  # --- INTERFACE GRAPHIQUE ---
  grafana:
    image: grafana/grafana-oss:latest
    container_name: deeppool-grafana
    volumes:
      - ./grafana_data:/var/lib/grafana
    environment:
      - TZ=Europe/Paris
      - GF_SERVER_ENABLE_GZIP=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_CSRF_TRUSTED_ORIGINS=${DOMAIN}
    restart: always
    networks:
      - internal

  # --- API ---
  api:
    image: ghcr.io/topin2001/deeppool/deeppool-api:latest
    container_name: deeppool-api
    volumes:
      - ./config.json:/config/config.json
      - ./schedule.json:/config/schedule.json
      - ./override.json:/config/override.json
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
      - API_SECRET_KEY=${API_SECRET_KEY}
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - influxdb

  # --- SITE WEB ---
  web:
    image: ghcr.io/topin2001/deeppool/deeppool-web:latest
    container_name: deeppool-web
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - api

# --- REVERSE PROXY ---
  nginx:
    image: nginx:alpine
    container_name: deeppool-nginx
    ports:
      - "80:80"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./nginx/templates:/etc/nginx/templates
    command: ["/bin/sh", "-c", "envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - api
      - web
      - grafana

  # --- MISES À JOUR ---
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: deeppool-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup
    restart: always
    networks:
      - internal

networks:
  internal:
    driver: bridge